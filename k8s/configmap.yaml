apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-config-defaults
  namespace: nordlynx
data:
  qBittorrent.conf: |
    [Application]
    FileLogger\Age=1
    FileLogger\AgeType=1
    FileLogger\Backup=true
    FileLogger\DeleteOld=true
    FileLogger\Enabled=true
    FileLogger\MaxSizeBytes=66560
    FileLogger\Path=/config/qBittorrent/logs

    [AutoRun]
    enabled=false
    program=

    [BitTorrent]
    ExcludedFileNamesEnabled=true
    Session\AddTorrentStopped=false
    Session\DefaultSavePath=/data/torrents
    Session\DisableAutoTMMByDefault=false
    Session\DisableAutoTMMTriggers\CategorySavePathChanged=false
    Session\DisableAutoTMMTriggers\DefaultSavePathChanged=false
    Session\ExcludedFileNames=Thumbs.db, desktop.ini, *.exe, *.bat, *.cmd, *.com, *.scr, *.pif, *.vbs, *.js, *.jar, *.msi, *.reg, *.dll, *.sys, *.tmp, *.log, *.torrent, *.url, *.lnk
    Session\GlobalMaxRatio=1
    Session\Interface=wg0
    Session\InterfaceName=wg0
    Session\MaxActiveTorrents=6
    Session\Port=6881
    Session\QueueingSystemEnabled=true
    Session\SSL\Port=8006
    Session\ShareLimitAction=Stop
    Session\TempPath=/downloads/incomplete/

    [Core]
    AutoDeleteAddedTorrentFile=Never

    [LegalNotice]
    Accepted=true

    [Meta]
    MigrationVersion=8

    [Network]
    PortForwardingEnabled=false

    [Preferences]
    Connection\PortRangeMin=6881
    Connection\UPnP=false
    Downloads\SavePath=/downloads/
    Downloads\TempPath=/downloads/incomplete/
    General\Locale=en
    MailNotification\req_auth=true
    WebUI\Address=*
    WebUI\AuthSubnetWhitelist=@Invalid()
    WebUI\Password_PBKDF2="@ByteArray(MSjA/FQIDzKPEHl89Gc2sw==:RHJ96aE0cAO9sdm6WATonT0tM3vfFZZdr2JIjAVrGv4PGlBzh6ImAuV7rDNIwos8eSiBtjn1OWewaESuhFbnrw==)"
    WebUI\Port=8088
    WebUI\ServerDomains=*
    WebUI\Username=tostinat

    [RSS]
    AutoDownloader\DownloadRepacks=true
    AutoDownloader\SmartEpisodeFilter=s(\\d+)e(\\d+), (\\d+)x(\\d+), "(\\d{4}[.\\-]\\d{1,2}[.\\-]\\d{1,2})", "(\\d{1,2}[.\\-]\\d{1,2}[.\\-]\\d{4})"

  categories.json: |
    {
        "prowlarr": {
            "save_path": ""
        },
        "radarr": {
            "save_path": "/data/torrents/movies"
        },
        "sonarr": {
            "save_path": "/data/torrents/tv"
        }
    }

  watched_folders.json: |
    {
    }
