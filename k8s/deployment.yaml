apiVersion: apps/v1
kind: Deployment
metadata:
  name: nordlynx
  namespace: nordlynx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nordlynx
  template:
    metadata:
      labels:
        app: nordlynx
    spec:
      securityContext:
        sysctls:
          - name: net.ipv6.conf.all.disable_ipv6
            value: "1"
      # Additional sysctls (uncomment if needed, requires kind-config.yaml allowlist + cluster reset)
      # securityContext:
      #   sysctls:
      #     - name: net.ipv4.conf.all.src_valid_mark
      #       value: "1"
      #     - name: net.ipv4.conf.all.rp_filter
      #       value: "2"

      # Seeds qBittorrent /config from the ConfigMap on first run only.
      # Skipped automatically if qBittorrent.conf already exists.
      initContainers:
        - name: init-qbittorrent-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                echo "First run: seeding qbittorrent config from defaults..."
                mkdir -p /config/qBittorrent/BT_backup
                cp /defaults/qBittorrent.conf /config/qBittorrent/qBittorrent.conf
                cp /defaults/categories.json /config/qBittorrent/categories.json
                cp /defaults/watched_folders.json /config/qBittorrent/watched_folders.json
                chown -R 1000:1000 /config
                echo "Config seeded."
              else
                echo "Config already exists, skipping seed."
              fi
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: qbittorrent-config-defaults
              mountPath: /defaults
              readOnly: true

      containers:
        - name: nordlynx
          image: localhost:5001/nordlynx:dev
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: nordlynx-env
          env:
            - name: LOG_LEVEL
              value: DEBUG
            - name: DNS
              value: "8.8.8.8,8.8.4.4"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_MODULE
          volumeMounts:
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true

        - name: microsocks
          image: vimagick/microsocks:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 1080
              name: socks5

        # qbittorrent shares the pod network namespace so it can see the nordlynx
        # WireGuard interface and bind to it directly. If the VPN drops, the interface
        # disappears and all transfers stop — a true hardware-level kill switch.
        - name: qbittorrent
          image: localhost:5001/qbittorrent:dev
          imagePullPolicy: Always
          # Poll until the nordlynx WireGuard interface exists before starting.
          command: ["/bin/sh", "-c"]
          args:
            - |
              until ip link show wg0 >/dev/null 2>&1; do
                echo "Waiting for wg0 (WireGuard) interface..."; sleep 3
              done
              echo "wg0 interface is up, starting qbittorrent..."
              exec /init
          ports:
            - containerPort: 8088
              name: webui
            - containerPort: 6881
              name: torrenting
            - containerPort: 6881
              protocol: UDP
              name: torrenting-udp
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: WEBUI_PORT
              value: "8088"
            - name: TORRENTING_PORT
              value: "6881"
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: qbittorrent-data
              mountPath: /data

      volumes:
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: qbittorrent-data
          persistentVolumeClaim:
            claimName: qbittorrent-data
        - name: qbittorrent-config-defaults
          configMap:
            name: qbittorrent-config-defaults
